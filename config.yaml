app_name: sync-chain-eth

chain:
  name: "bsc_testnet"
  chain_id: 97
  genesis_block_hash: "0x6d3c66c5357ec91d5c43af47e234a939b22557cbb552dc45bebbceeed90fbe34"
  reversible_blocks: 5

fetch:
  rpc_nodes:
     - "wss://bnb-testnet.g.alchemy.com/v2/fTJySYmIh0pJR0J_-_Q9z60YqerqYf6i"
    #- "https://bnb-testnet.g.alchemy.com/v2/fTJySYmIh0pJR0J_-_Q9z60YqerqYf6i"
    #- "wss://sepolia.infura.io/ws/v3/e7c3204e24c449ed8ab35075cb1a251a"
