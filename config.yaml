  timeout: 5s
  start_height : 24290007
  end_height : -1

store:
  host: "root:123456@tcp(127.0.0.1:3306)/chain_bsc_testnet?charset=utf8mb4"
  channel_size: 100
  batch_size: 20
  auto_create_tables: true # prd environment set false

log:
  stdout:
    enable: true
    level: 5
