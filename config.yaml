app_name: scanner_bsc_testnet

chain:
  chain_id: 97
  genesis_block_hash: "0x6d3c66c5357ec91d5c43af47e234a939b22557cbb552dc45bebbceeed90fbe34"
  reversible_blocks: 5

fetch:
  rpc_nodes:
    - "http://127.0.0.1:8545"

  timeout: 5s
  start_height: -1 #if db has blocks, this config would be ignored
  end_height:  -1
  #With internal txs, all account balance changed action and all contract created action could be captured.
  #But this api need archive node, and always it is not free.
  #If set false, balanceChanged and contractCreated is incomplete.
  #For test, set false is ok.
  enable_internal_tx: true

store:
  host: "root:123456@tcp(127.0.0.1:3306)/scanner_bsc_testnet?charset=utf8mb4"
  channel_size: 100
  batch_size: 100
  worker_count: 8
  auto_create_tables: true # prd environment set false
  # all parsed data has been published to mq
  # block,chain_binlog,scanner_info are necessary to store, the rest is optional.
  optional:
    - "tx"
    - "tx_internal"
    - "event_log"
    - "balance_native"
    - "balance_erc20"
    - "balance_erc1155"
    - "event_erc20_transfer"
    - "event_erc721_transfer"
    - "event_erc1155_transfer"
    - "contract"
    - "contract_erc20"
    - "contract_erc721"
    - "token_erc721"

publish:
  kafka_servers:
    - "127.0.0.1:9092"
  topic: "scanner_bsc_testnet"
  channel_size: 100

#panic=0, fatal=1, error=2, warn=3, info=4, debug=5, trace=6, 
log:
  console:
    enable: true
    level: debug
  file:
    enable: true
    name: "./logs/app.log"
    max_size: 100 #MB
    max_backups: 30
    max_age: 30 #day
    level: info