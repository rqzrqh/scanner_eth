app_name: scanner_bsc_testnet

chain:
  chain_name: "bsc_testnet"
  chain_id: 97
  genesis_block_hash: "0x6d3c66c5357ec91d5c43af47e234a939b22557cbb552dc45bebbceeed90fbe34"
  reversible_blocks: 5

database:
  host: "127.0.0.1"
  port: 3306
  user: root
  password: "123456"  # 修改为你的数据库密码
  dbname: scanner_bsc_testnet
  charset: utf8mb4
  parseTime: true
  loc: Local

redis:
  addr: "127.0.0.1:6379"  # Redis 地址
  username: ""  # Redis 用户名（如果需要）
  password: ""  # Redis 密码（如果需要）
  db: 15  # Redis 数据库编号
  pool_size: 10  # 连接池大小
  min_idle_conns: 5  # 最小空闲连接数
  dial_timeout: 5  # 连接超时
  read_timeout: 3  # 读取超时
  write_timeout: 3  # 写入超时

kafka:
  brokers:
    - "127.0.0.1:9092"
  topic: "scanner_bsc_testnet"

fetch:
  rpc_nodes:
    #- "http://127.0.0.1:8545"
    #- "https://bnb-testnet.g.alchemy.com/v2/fTJySYmIh0pJR0J_-_Q9z60YqerqYf6i"
    - "wss://bsc-testnet-rpc.publicnode.com"

  timeout: 5s
  start_height: 97160018 #if db has blocks, this config would be ignored
  end_height:  -1
  #With internal txs, all account balance changed action and all contract created action could be captured.
  #But this api need archive node, and always it is not free.
  #If set false, balanceChanged and contractCreated is incomplete.
  #For test, set false is ok.
  enable_internal_tx: false
  filter:
    meme:
      contract_address: "0x1e7e3caa1a9b2c8f5cbd8d9a0b4cbbacfa1e7e"
    erc20_payment:
      contract_address: "0x2e1ad108ff1d8c782fcbbccce0ad466ae68f986"
    hybrid_nft:
      contract_address: "0x960b236a07cf122663c4303350609a66a7b288c"
    uniswap_v2:
      router_address: "0x10ed43c718714eb63d5aa57b78b54704e256024e"
  store:
    auto_create_tables: true # prd environment set false
    batch_size: 128
    worker_count: 8
    # all parsed data has been published to mq
    # block,chain_binlog,scanner_info are necessary to store, the rest is optional.
    optional:
      - "tx"
      - "tx_internal"
      - "event_log"
      - "balance_native"
      - "balance_erc20"
      - "balance_erc1155"
      - "event_erc20_transfer"
      - "event_erc721_transfer"
      - "event_erc1155_transfer"
      - "contract"
      - "contract_erc20"
      - "contract_erc721"
      - "token_erc721"
  task_pool:
    worker_count: 0 # 0 means use rpc_nodes count
    high_queue_size: 1024
    normal_queue_size: 2048
    max_retry: 2
    stats_log_interval: 30s

metrics:
  enable: true
  addr: "127.0.0.1:6060"
  path: "./vars"

#panic=0, fatal=1, error=2, warn=3, info=4, debug=5, trace=6, 
log:
  console:
    enable: true
    level: info
  file:
    enable: true
    name: "./logs/app.log"
    max_size: 100 #MB
    max_backups: 30
    max_age: 30 #day
    level: info